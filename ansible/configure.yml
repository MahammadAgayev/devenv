- hosts: localhost
  connection: local
  vars:
    home: "{{ lookup('env', 'HOME') }}"
    devenv: "{{ playbook_dir | dirname }}"
    profile: "{{ profile | default('uber') }}"
    workspace: "{{ workspace | default('local') }}"

  tasks:
    - name: Symlink dotfiles
      file:
        src: "{{ devenv }}/dotfiles/{{ item.src }}"
        dest: "{{ home }}/{{ item.dest }}"
        state: link
        force: true
      loop:
        - src: ".zshrc"
          dest: ".zshrc"
        - src: ".p10k.zsh"
          dest: ".p10k.zsh"
        - src: ".tmux.conf"
          dest: ".tmux.conf"
        - src: ".gitconfig"
          dest: ".gitconfig"

    - name: Ensure ~/.ssh exists
      file:
        path: "{{ home }}/.ssh"
        state: directory
        mode: '0700'

    - name: Set perms on dotfiles/.ssh-config (ssh requires 0600)
      file:
        path: "{{ devenv }}/dotfiles/.ssh-config"
        mode: '0600'

    - name: Symlink ~/.ssh/config
      file:
        src: "{{ devenv }}/dotfiles/.ssh-config"
        dest: "{{ home }}/.ssh/config"
        state: link
        force: true

    - name: Symlink .gitconfig_uber (uber only)
      file:
        src: "{{ devenv }}/dotfiles/.gitconfig_uber"
        dest: "{{ home }}/.gitconfig_uber"
        state: link
        force: true
      when: profile == 'uber'

    - name: Symlink tmux-sessionizer
      file:
        src: "{{ devenv }}/scripts/tmux-sessionizer"
        dest: "{{ home }}/tmux-sessionizer"
        state: link
        force: true
        mode: '0755'

    - name: Symlink tmux-ssh
      file:
        src: "{{ devenv }}/scripts/tmux-ssh"
        dest: "{{ home }}/tmux-ssh"
        state: link
        force: true
        mode: '0755'

    - name: Symlink tpi
      file:
        src: "{{ devenv }}/scripts/tpi"
        dest: "{{ home }}/tpi"
        state: link
        force: true
        mode: '0755'

    - name: Symlink tclaude
      file:
        src: "{{ devenv }}/scripts/tclaude"
        dest: "{{ home }}/tclaude"
        state: link
        force: true
        mode: '0755'

    - name: Ensure ~/.config/ghostty exists
      file:
        path: "{{ home }}/.config/ghostty"
        state: directory
        mode: '0755'

    - name: Symlink ghostty config
      file:
        src: "{{ devenv }}/dotfiles/ghostty.config"
        dest: "{{ home }}/.config/ghostty/config"
        state: link
        force: true

    - name: Symlink nvim config
      file:
        src: "{{ devenv }}/nvim"
        dest: "{{ home }}/.config/nvim"
        state: link
        force: true

    - name: Ensure ~/.claude exists
      file:
        path: "{{ home }}/.claude"
        state: directory
        mode: '0755'

    - name: Symlink Claude settings
      file:
        src: "{{ devenv }}/claude/{{ profile }}.json"
        dest: "{{ home }}/.claude/settings.json"
        state: link
        force: true

    - name: Symlink Claude instructions (CLAUDE.md)
      file:
        src: "{{ devenv }}/agents/AGENTS.md"
        dest: "{{ home }}/.claude/CLAUDE.md"
        state: link
        force: true

    - name: Ensure ~/.claude/hooks exists
      file:
        path: "{{ home }}/.claude/hooks"
        state: directory
        mode: '0755'

    - name: Symlink RTK hook
      file:
        src: "{{ devenv }}/claude/hooks/rtk-rewrite.sh"
        dest: "{{ home }}/.claude/hooks/rtk-rewrite.sh"
        state: link
        force: true
        mode: '0755'

    - name: Symlink go-code envrc (uber + go-devpod only)
      file:
        src: "{{ devenv }}/dotfiles/.gomonorepo.envrc.local"
        dest: "{{ home }}/go-code/.envrc.local"
        state: link
        force: true
      when: profile == 'uber' and workspace == 'go-devpod'

    - name: Ensure ~/ulsp exists (uber + go-devpod only)
      file:
        path: "{{ home }}/ulsp"
        state: directory
        mode: '0755'
      when: profile == 'uber' and workspace == 'go-devpod'

    - name: Symlink ulsp.sh (uber + go-devpod only)
      file:
        src: "{{ devenv }}/scripts/ulsp.sh"
        dest: "{{ home }}/ulsp/ulsp.sh"
        state: link
        force: true
        mode: '0755'
      when: profile == 'uber' and workspace == 'go-devpod'

    - name: Ensure ~/.pi/agent exists
      file:
        path: "{{ home }}/.pi/agent"
        state: directory
        mode: '0755'

    - name: Symlink Pi extensions dir (devenv)
      file:
        src: "{{ devenv }}/pi/extensions"
        dest: "{{ home }}/.pi/agent/extensions"
        state: link
        force: true

    - name: Symlink Pi skills dir (devenv)
      file:
        src: "{{ devenv }}/pi/skills"
        dest: "{{ home }}/.pi/agent/skills"
        state: link
        force: true

    - name: Symlink Pi themes dir (devenv)
      file:
        src: "{{ devenv }}/pi/themes"
        dest: "{{ home }}/.pi/agent/themes"
        state: link
        force: true

    - name: Symlink Pi instructions (AGENTS.md)
      file:
        src: "{{ devenv }}/agents/AGENTS.md"
        dest: "{{ home }}/.pi/agent/AGENTS.md"
        state: link
        force: true

    - name: Symlink Pi models config (uber only)
      file:
        src: "{{ devenv }}/pi/models.uber.json"
        dest: "{{ home }}/.pi/agent/models.json"
        state: link
        force: true
      when: profile == 'uber'

    - name: Symlink Pi settings config (uber only)
      file:
        src: "{{ devenv }}/pi/settings.uber.json"
        dest: "{{ home }}/.pi/agent/settings.json"
        state: link
        force: true
      when: profile == 'uber'

    - name: Symlink Pi models config (personal)
      file:
        src: "{{ devenv }}/pi/models.json"
        dest: "{{ home }}/.pi/agent/models.json"
        state: link
        force: true
      when: profile == 'personal'

    - name: Symlink Pi settings config (personal)
      file:
        src: "{{ devenv }}/pi/settings.json"
        dest: "{{ home }}/.pi/agent/settings.json"
        state: link
        force: true
      when: profile == 'personal'

    - name: Symlink Pi keybindings config (devenv)
      file:
        src: "{{ devenv }}/pi/keybindings.json"
        dest: "{{ home }}/.pi/agent/keybindings.json"
        state: link
        force: true

    - name: Install devenv post-merge hook
      file:
        src: "{{ devenv }}/git-hooks/devenv-post-merge"
        dest: "{{ devenv }}/.git/hooks/post-merge"
        state: link
        force: true
        mode: '0755'
