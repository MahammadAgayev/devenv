- hosts: localhost
  connection: local
  vars:
    home: "{{ lookup('env', 'HOME') }}"
    zsh_custom: "{{ lookup('env', 'ZSH_CUSTOM') | default(home + '/.oh-my-zsh/custom', true) }}"

  tasks:
    - name: Install packages (macOS)
      community.general.homebrew:
        name: [zsh, git, tmux, fzf, curl, neovim, ripgrep, node, oven-sh/bun/bun]
        state: present
      when: ansible_facts['system'] == 'Darwin'

    - name: Install packages (Linux)
      apt:
        name: [zsh, git, tmux, fzf, curl, ripgrep, build-essential, nodejs, npm]
        state: present
        update_cache: true
      become: true
      when: ansible_facts['os_family'] in ['Debian', 'RedHat']

    - name: Install Rust via rustup
      shell: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path
      args:
        creates: "{{ home }}/.cargo/bin/cargo"

    - name: Install tree-sitter-cli via cargo
      shell: "{{ home }}/.cargo/bin/cargo install --locked tree-sitter-cli"
      args:
        creates: "{{ home }}/.cargo/bin/tree-sitter"

    - name: Check Oh My Zsh installed
      stat: { path: "{{ home }}/.oh-my-zsh" }
      register: omz

    - name: Install Oh My Zsh
      shell: curl -fsSL https://raw.github.com/ohmyzsh/ohmyzsh/master/tools/install.sh | KEEP_ZSHRC=yes sh -s -- --unattended
      when: not omz.stat.exists

    - name: Install Powerlevel10k
      git:
        repo: https://github.com/romkatv/powerlevel10k.git
        dest: "{{ zsh_custom }}/themes/powerlevel10k"
        depth: 1
        update: false

    - name: Install zsh-autosuggestions
      git:
        repo: https://github.com/zsh-users/zsh-autosuggestions.git
        dest: "{{ home }}/.oh-my-zsh/plugins/zsh-autosuggestions"
        update: false

    - name: Install RTK (token compressor)
      shell: curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh
      args:
        creates: "{{ home }}/.local/bin/rtk"

    - name: Check if bun installed
      shell: command -v bun || test -x {{ home }}/.bun/bin/bun
      register: bun_check
      changed_when: false
      failed_when: false

    - name: Install bun (Linux)
      shell: curl -fsSL https://bun.sh/install | bash
      args:
        creates: "{{ home }}/.bun/bin/bun"
      when: ansible_facts['os_family'] in ['Debian', 'RedHat'] and bun_check.rc != 0

    - name: Resolve bun binary path
      shell: command -v bun || echo {{ home }}/.bun/bin/bun
      register: bun_bin
      changed_when: false

    - name: Check if Pi CLI installed
      shell: command -v pi || test -x {{ home }}/.bun/bin/pi
      register: pi_check
      changed_when: false
      failed_when: false

    - name: Install Pi CLI (via bun)
      shell: "{{ bun_bin.stdout }} install -g @earendil-works/pi-coding-agent"
      when: pi_check.rc != 0

    - name: Verify Pi CLI is available
      shell: command -v pi || test -x {{ home }}/.bun/bin/pi
      changed_when: false

    - name: Update nvim-treesitter plugin
      shell: nvim --headless -c "Lazy! update nvim-treesitter" -c "qa" 2>/dev/null || true

    - name: Reinstall all treesitter parsers
      shell: nvim --headless -c "TSUninstall! all" -c "TSInstall! all" -c "qa" 2>/dev/null || true
